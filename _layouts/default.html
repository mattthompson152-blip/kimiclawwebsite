<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  {% seo %}
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ '/assets/images/logo.png' | relative_url }}">
  
  <!-- Preconnect to external domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  
  <!-- Mobile Menu CSS (Inline for reliability) -->
  <style>
    /* Mobile Menu - Clean Implementation */
    #primary-menu {
      display: none;
    }
    
    #primary-menu.is-open {
      display: flex !important;
      position: fixed;
      top: 70px;
      left: 0;
      right: 0;
      bottom: 0;
      background: #1a1a1a;
      flex-direction: column;
      padding: 2rem;
      z-index: 9999;
      overflow-y: auto;
    }
    
    #primary-menu.is-open .nav-menu {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      list-style: none;
      padding: 0;
      margin: 0;
      width: 100%;
    }
    
    #primary-menu.is-open .nav-menu li {
      border-bottom: 1px solid #404040;
      padding-bottom: 1rem;
    }
    
    #primary-menu.is-open .nav-link {
      color: #ffffff !important;
      font-size: 1.25rem;
      display: block;
      padding: 0.5rem 0;
      text-decoration: none;
    }
    
    #primary-menu.is-open .nav-link:hover {
      color: #ff6b4a !important;
    }
    
    #primary-menu.is-open .nav-cta {
      margin-top: 2rem;
      width: 100%;
      text-align: center;
      display: block;
      padding: 1rem;
      background: #ff6b4a;
      color: #ffffff;
      border-radius: 4px;
      font-size: 1.125rem;
      font-weight: 600;
      text-decoration: none;
    }
    
    #primary-menu.is-open .dropdown-menu {
      display: block;
      list-style: none;
      padding: 0.5rem 0 0 1rem;
      margin: 0.5rem 0 0 0;
    }
    
    #primary-menu.is-open .dropdown-menu li {
      border: none;
      padding: 0.25rem 0;
    }
    
    #primary-menu.is-open .dropdown-menu a {
      color: #a3a3a3;
      text-decoration: none;
      font-size: 1rem;
      display: block;
      padding: 0.25rem 0;
    }
    
    /* Desktop - hide mobile menu styles */
    @media (min-width: 992px) {
      #primary-menu {
        display: flex !important;
        position: static;
        flex-direction: row;
        background: transparent;
        padding: 0;
      }
      
      #primary-menu .nav-menu {
        flex-direction: row;
        gap: 1.5rem;
      }
      
      #primary-menu .nav-menu li {
        border: none;
        padding: 0;
      }
    }
  </style>
  
  <!-- Schema Markup -->
  {% include schema.html %}
  
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-72QBZSZZBP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-72QBZSZZBP');
  </script>
</head>
<body class="{% if page.layout %}{{ page.layout }}{% endif %}">
  
  {% include header.html %}
  
  <main id="main-content" class="site-main">
    {{ content }}
  </main>
  
  {% include footer.html %}
  
  <!-- SimplyBook.me Widget - FIXED -->
  <script src="https://widget.simplybook.me/v2/widget/widget.js" type="text/javascript"></script>
  <script type="text/javascript">
    var widget = new SimplyBookWidget({
      "widget_type": "button",
      "url": "https://singtheeasyway.simplybook.me",
      "theme": "air",
      "theme_settings": {
        "timeline_modern_display": "as_slots",
        "timeline_hide_unavailable": "1",
        "hide_past_days": "0",
        "timeline_show_end_time": "0",
        "sb_base_color": "#ff6b4a",
        "display_item_mode": "block",
        "booking_nav_bg_color": "#ff6b4a",
        "body_bg_color": "#0a0a0a",
        "sb_review_image": "",
        "dark_font_color": "#ffffff",
        "light_font_color": "#a3a3a3",
        "btn_color_1": "#ff6b4a",
        "sb_company_label_color": "#ffffff",
        "hide_img_mode": "0",
        "show_sidebar": "1",
        "sb_busy": "#ff6b4a",
        "sb_available": "#22c55e"
      },
      "timeline": "modern",
      "datepicker": "top_calendar",
      "is_rtl": false,
      "app_config": {
        "clear_session": 0,
        "allow_switch_to_ada": 0,
        "predefined": []
      },
      "button_title": "Book Now",
      "button_background_color": "#ff6b4a",
      "button_text_color": "#ffffff",
      "button_position": "right",
      "button_position_offset": "55%"
    });
  </script>
  
  <!-- Main JavaScript -->
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/mobile-menu.js' | relative_url }}"></script>
</body>
</html>
