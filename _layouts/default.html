<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  {% seo %}
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">
  
  <!-- Preconnect to external domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  
  <!-- Schema Markup -->
  {% include schema.html %}
</head>
<body class="{% if page.layout %}{{ page.layout }}{% endif %}">
  
  {% include header.html %}
  
  <main id="main-content" class="site-main">
    {{ content }}
  </main>
  
  {% include footer.html %}
  
  <!-- SimplyBook.me Widget -->
  <script src="https://widget.simplybook.me/v2/widget/widget.js" type="text/javascript"></script>
  <script type="text/javascript">
    var widget = new SimplybookWidget({
      "widget_type": "button",
      "url": "https://singtheeasyway.simplybook.me",
      "theme": "default",
      "theme_settings": {
        "timeline_hide_unavailable": "1",
        "hide_past_days": "0",
        "timeline_show_end_time": "0",
        "timeline_modern_display": "as_slots",
        "sb_base_color": "#ff6b4a",
        "display_item_mode": "block",
        "body_bg_color": "#0a0a0a",
        "sb_review_image": "",
        "dark_font_color": "#ffffff",
        "light_font_color": "#a3a3a3",
        "sb_company_label_color": "#ffffff",
        "hide_img_mode": "0",
        "show_sidebar": "1",
        "sb_busy": "#ff6b4a",
        "sb_available": "#22c55e"
      },
      "timeline": "modern",
      "datepicker": "top_calendar",
      "is_rtl": false,
      "app_config": {
        "clear_session": 0,
        "allow_switch_to_ada": 0,
        " predefined": []
      },
      "button_title": "Book Now",
      "button_background_color": "#ff6b4a",
      "button_text_color": "#ffffff",
      "button_position": "right",
      "button_position_offset": "55%"
    });
  </script>
  
  <!-- Main JavaScript -->
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
